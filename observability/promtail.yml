server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: applogs
    static_configs:
    - targets:
        - localhost
      labels:
        job: subscription-management
        __path__: /var/log/app/app.log
    pipeline_stages:
    - json:
        expressions:
          trace_id: trace_id
          level: level
    - labels:
        level:
    - structured_metadata:
        trace_id:
