server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml 

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: applogs
    static_configs:
    - targets:
        - localhost
      labels:
        job: subscription-management
        # The glob pattern (*) forces Promtail to poll the directory more aggressively
        __path__: /var/log/app/*.log 
    pipeline_stages:
    - json:
        expressions:
          trace_id: trace_id
          level: level
          log_time: time # Extract the actual slog timestamp
    - labels:
        level:
    - timestamp:
        source: log_time
        format: RFC3339Nano # Tell Loki to use the Go timestamp, not the scrape timestamp
    - structured_metadata:
        trace_id: